services:
  - type: web
    name: virtue-team-tracker-api
    runtime: node
    buildCommand: npx pnpm@9 install --no-frozen-lockfile --ignore-scripts && npx pnpm@9 --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # set this manually in Render dashboard — keep it secret
    autoDeploy: true
